version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rawly_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rawly_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rawly_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rawly_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      ENV: production
      API_URL: http://localhost:8080
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: rawly_db
      DB_SSLMODE: disable
      JWT_SECRET: rawly_secret_key_change_me_in_production_1234567890
      JWT_ACCESS_EXPIRY_MINUTES: 15
      JWT_REFRESH_EXPIRY_DAYS: 7
      MAX_AVATAR_SIZE_MB: 5
      MAX_MEDIA_SIZE_MB: 50
      RATE_LIMIT_MAX: 100
      RATE_LIMIT_DURATION_SECONDS: 60
    volumes:
      # Mount host uploads folder to persist user avatars, posts, and videos
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
